name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              echo "Building ${os}/${arch}..."
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o dist/tokencoach .
              tar -czf "dist/tokencoach_${os}_${arch}.tar.gz" -C dist tokencoach
              rm dist/tokencoach
            done
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.tar.gz \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          SHA_DARWIN_AMD64=$(shasum -a 256 dist/tokencoach_darwin_amd64.tar.gz | awk '{print $1}')
          SHA_DARWIN_ARM64=$(shasum -a 256 dist/tokencoach_darwin_arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_AMD64=$(shasum -a 256 dist/tokencoach_linux_amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 dist/tokencoach_linux_arm64.tar.gz | awk '{print $1}')

          cat > formula.rb <<FORMULA
          class Tokencoach < Formula
            desc "Cost analytics for Claude Code sessions"
            homepage "https://github.com/zhubert/tokencoach"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/zhubert/tokencoach/releases/download/${TAG}/tokencoach_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/zhubert/tokencoach/releases/download/${TAG}/tokencoach_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/zhubert/tokencoach/releases/download/${TAG}/tokencoach_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/zhubert/tokencoach/releases/download/${TAG}/tokencoach_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "tokencoach"
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' formula.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/zhubert/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/tokencoach.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tokencoach.rb
          git commit -m "Update tokencoach to ${VERSION}"
          git push
