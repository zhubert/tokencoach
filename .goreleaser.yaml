version: 2

builds:
  - binary: tokencoach
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz

brews:
  - repository:
      owner: zhubert
      name: homebrew-taps
    homepage: https://github.com/zhubert/tokencoach
    description: Cost analytics for Claude Code sessions
    license: MIT
    install: |
      bin.install "tokencoach"
